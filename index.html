<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 카톡 미리보기 -->
<meta property="og:title" content="불금 테스트 💖">
<meta property="og:description" content="빨리해봐 강추">
<meta property="og:image" content="https://ggulduckee.github.io/kkobbang-day/thumb.jpg">
<meta property="og:url" content="https://ggulduckee.github.io/kkobbang-day">
<meta property="og:type" content="website">

<title>불금 테스트 💖</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffeef2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  background: white;
  border-radius: 20px;
  padding: 30px 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #ff5c8a;
  transition: 0.3s;
}

h1 {
  font-size: 20px;
  margin-bottom: 30px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.yes {
  background: #ff5c8a;
  color: white;
}

.no {
  background: #ddd;
}

.share {
  background: #fee500;
  margin-top: 20px;
}

#result {
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🎵 배경음악 -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>

  <h1 id="question">금요일은 꼬빵데이~ 😏</h1>

  <button class="yes" onclick="nextStep()">좋아 💖</button>
  <button class="no" id="noBtn">미쳤어?</button>

  <div id="result"></div>

  <button class="share" onclick="shareKakao()">카톡으로 공유하기 💛</button>

</div>

<script>
const bgm = document.getElementById("bgm");

// 📱 모바일 포함 클릭 시 음악 재생
document.body.addEventListener("click", () => {
  bgm.play().catch(() => {});
}, { once: true });

let step = 0;
const noBtn = document.getElementById("noBtn");
const bar = document.getElementById("bar");
const question = document.getElementById("question");

// 😈 도망 이벤트 (PC + 모바일)
noBtn.addEventListener("mouseover", move);
noBtn.addEventListener("touchstart", move);
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  move();
});

function move() {
  noBtn.style.position = "absolute";
  noBtn.style.transition = "0.2s";

  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 60);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// 💖 진행 로직
function nextStep() {
  step++;
  bar.style.width = (step * 33) + "%";

  if (step === 1) {
    question.innerText = "실망이야 😒";
  } else if (step === 2) {
    question.innerText = "메롱😈";
  } else {
    question.innerText = "검사 완료 💖";
    document.getElementById("result").innerText =
      "무한 꼬빵 확정 😏💋";
  }
}

// 📤 공유
function shareKakao() {
  const url = window.location.href;

  if (navigator.share) {
    navigator.share({
      title: "불금 테스트 💖",
      text: "꼬빵해주때염",
      url: url
    });
  } else {
    alert("이 링크 복사해서 보내줘 😏\n" + url);
  }
}
</script>

</body>
</html>
